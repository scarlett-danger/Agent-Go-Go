name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly deep scan — Monday 06:00 UTC.
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest

    permissions:
      security-events: write  # upload SARIF results to GitHub Security tab
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: go
          # Default query suite — covers security-and-quality.
          # Upgrade to "security-extended" for a broader (noisier) ruleset.
          queries: security-and-quality

      # Autobuild compiles the Go module; no manual build step needed.
      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
