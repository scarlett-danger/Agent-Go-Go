name: Deploy

# Runs only after CI passes on main — no direct push trigger so a red CI
# can never accidentally gate-crash production.
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    environment: production

    # Only deploy when CI actually passed — a cancelled run is not a pass.
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      # fly.toml must be committed at the repo root.
      # Run `fly launch` locally once to generate it, then commit it.
      # Required secret: FLY_API_TOKEN
      #   Settings → Secrets → Actions → New repository secret
      #   Get a token from: fly.io/user/personal_access_tokens
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
