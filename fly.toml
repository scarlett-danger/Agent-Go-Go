# fly.toml app configuration file generated for agent-go-go on 2026-04-27T10:29:36Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agent-go-go'
primary_region = 'dfw'

[build]

[deploy]
  strategy = 'rolling'

[env]
  DB_PATH = '/app/data/bot.db'
  MCP_CONFIG = '/app/config/mcp.yaml'
  MEMORY_MAX_TURNS = '20'
  MEMORY_SUMMARIZE_AT = '30'
  MEMORY_SUMMARIZE_FOLD = '10'
  ROUTING_CONFIG = '/app/config/routing.yaml'
  SENTRY_ENVIRONMENT = 'production'
  SENTRY_TRACES_SAMPLE_RATE = '0.2'
  SERVER_PORT = '8080'
  TEMPORAL_NAMESPACE = 'default'
  TEMPORAL_TASK_QUEUE = 'Agent-Go-Go-queue'

[[mounts]]
  source = 'agent_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
